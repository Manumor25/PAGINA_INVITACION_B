{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación de Boda</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS (CORREGIDO SIN ESPACIO) -->
    <link rel="stylesheet" href="{% static 'app/css/estilos.css' %}">

    <!-- Leaflet CSS (para mapas) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

    {% block css %}{% endblock %}
</head>

<body>

    <div class="main-wrapper">
        {% block contenido %}{% endblock %}
    </div>

    <footer class="footer">
        <p>Hecho con ❤️ para nuestro gran día</p>
    </footer>

    <!-- JS -->
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>

    <!-- Leaflet JS (para mapas) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <script src="{% static 'app/js/validador.js' %}"></script>

    {% block js %}{% endblock %}

</body>
</html>
